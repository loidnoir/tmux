# ── Palette ───────────────────────────────────────────────────────────────────
set -g @primary   "#cfcfcf"
set -g @secondary "#5c5b5b"
set -g @tertiary  "#00afff"

# ── Prefix ────────────────────────────────────────────────────────────────────
set -g prefix C-a
bind C-a send-prefix          # press C-a twice to send a literal C-a

# ── General ───────────────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc,xterm-ghostty:Tc"  # true color
set -as terminal-features ",xterm-ghostty:RGB"

set  -g escape-time 10        # no lag for <Esc> in nvim
set  -g repeat-time 600       # window for repeatable (-r) keys
set  -g history-limit 100000
set  -g display-time 2000     # status messages stay 2s
set  -g focus-events on       # let nvim/apps know focus changed
set  -g mouse on
setw -g mode-keys vi
set  -g set-clipboard on      # OSC52 -> system clipboard (works in Ghostty)
set  -g detach-on-destroy off # on killing a session, switch to another

# Index windows/panes from 1, keep numbering tidy.
set  -g base-index 1
setw -g pane-base-index 1
set  -g renumber-windows on

# Activity
set  -g monitor-activity on
set  -g visual-activity off

# ── Status bar ────────────────────────────────────────────────────────────────
setw -g window-status-separator ""

# Inactive
setw -g window-status-style         "fg=#{@primary},bg=default"
setw -g window-status-format        " #I #W "

# Active
setw -g window-status-current-style "fg=#{@secondary},bg=#{@primary},bold"
setw -g window-status-current-format " #I #W "
setw -g window-status-activity-style "fg=#{@primary},bg=default"

# Informative
set -g message-style "bg=#{@secondary},fg=#{@primary},bold"
set -g mode-style    "bg=#{@secondary},fg=#{@primary},bold"
# Borders
set -g pane-border-style        "fg=#{@secondary}"
set -g pane-active-border-style "fg=#{@primary}"

# Title
set -g set-titles on
set -g set-titles-string "#h"

# ── Key bindings ──────────────────────────────────────────────────────────────
# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "config reloaded"

# Splits
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window      -c "#{pane_current_path}"
# Destroy the whole window and all its panes (with confirmation)
bind C-& confirm-before -p "kill window #W and all its panes? (y/n)" kill-window
unbind '"'
unbind %

# Pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes 
bind -r H resize-pane -L 3
bind -r J resize-pane -D 3
bind -r K resize-pane -U 3
bind -r L resize-pane -R 3

# Quick window switching
bind -r C-k previous-window
bind -r C-j next-window
bind Tab last-window

# Copy mode
bind Enter copy-mode
bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi y   send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Escape send -X cancel
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"

# Toggle synchronized panes
bind S setw synchronize-panes \; display "sync #{?pane_synchronized,on,off}"

# ── Plugins (TPM) ─────────────────────────────────────────────────────────────
# Plugins live under this XDG path (not ~/.tmux/plugins).
set-environment -g TMUX_PLUGIN_MANAGER_PATH "~/.config/tmux/plugins"

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'          # robust cross-platform copy
set -g @plugin 'tmux-plugins/tmux-resurrect'     # save/restore sessions
set -g @plugin 'tmux-plugins/tmux-continuum'     # auto save/restore
set -g @plugin 'christoomey/vim-tmux-navigator'  # seamless nvim<->tmux panes

set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '10'             # minutes

# Auto-install TPM on first launch.
if "test ! -d ~/.config/tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm && ~/.config/tmux/plugins/tpm/bin/install_plugins'"

run "~/.config/tmux/plugins/tpm/tpm"
